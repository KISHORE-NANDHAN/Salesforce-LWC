<template>
    <lightning-card title="Authentication">

        <!-- ✅ LOGIN SUCCESS UI -->
        <template if:true={isSuccess}>
            <div class="slds-p-around_large slds-align_absolute-center">
                <div class="slds-text-align_center">
                    <h1 class="slds-text-heading_large slds-text-color_success">
                        ✅ Login Successful
                    </h1>

                    <p class="slds-m-top_small">
                        Welcome, {loginUsername}!
                    </p>

                    <div class="slds-m-top_medium">
                        <lightning-button label="Logout" onclick={handleLogout}></lightning-button>
                    </div>
                </div>
            </div>
        </template>

        <!-- ✅ LOGIN FORM -->
        <template if:true={isLogin}>
            <div class="slds-p-around_medium">

                <lightning-input label="Username" value={loginUsername} onchange={handleLoginChange}></lightning-input>
                <lightning-input label="Password" type="password" value={loginPassword} onchange={handleLoginChange}></lightning-input>

                <div class="slds-m-top_medium">
                    <lightning-button label="Login" variant="brand" onclick={handleLogin}></lightning-button>
                    <lightning-button label="Signup" class="slds-m-left_small" onclick={showSignup}></lightning-button>
                </div>
            </div>
        </template>

        <!-- ✅ SIGNUP FORM -->
        <template if:true={isSignup}>
            <div class="slds-p-around_medium">

                <lightning-input label="Full Name" onchange={handleSignupChange}></lightning-input>
                <lightning-input label="Email" type="email" onchange={handleSignupChange}></lightning-input>
                <lightning-input label="Username" onchange={handleSignupChange}></lightning-input>
                <lightning-input type="password" label="Password" onchange={handleSignupChange}></lightning-input>

                <div class="slds-m-top_medium">
                    <lightning-button label="Submit" variant="brand" onclick={handleSignup}></lightning-button>
                    <lightning-button label="Back to Login" class="slds-m-left_small" onclick={showLogin}></lightning-button>
                </div>
            </div>
        </template>

    </lightning-card>
</template>
