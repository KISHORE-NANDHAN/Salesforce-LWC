<template>
    <lightning-card title="Create New Prescription" icon-name="custom:custom85">

        <div class="slds-p-around_medium">

            <!-- ───────────────────────────────────────────
                 SECTION 1 – Header fields (Parent record)
                 Uses a plain <div> wrapper; the actual DML
                 is driven by the Apex method, NOT by the
                 form's own submit, so no <lightning-record-edit-form>
                 is needed here. Removing it avoids the risk
                 of an accidental platform-level insert.
            ─────────────────────────────────────────────── -->
            <h3 class="slds-text-heading_small slds-m-bottom_medium">
                Prescription Information
            </h3>
            <lightning-record-edit-form object-api-name="Prescription__c" >
            <div class="slds-grid slds-gutters slds-wrap">

                <div class="slds-col slds-size_1-of-3">
                    <!-- Lookup: Patient -->
                    <lightning-input-field
                        field-name="Patient__c"
                        data-id="patient"
                        value={patientId}
                        onchange={handleParentChange}
                        required>
                    </lightning-input-field>
                </div>

                <div class="slds-col slds-size_1-of-3">
                    <!-- Lookup: Doctor -->
                    <lightning-input-field
                        field-name="Doctor_Name__c"
                        data-id="doctor"
                        value={doctorId}
                        onchange={handleParentChange}
                        required>
                    </lightning-input-field>
                </div>

                <div class="slds-col slds-size_1-of-3">
                    <!-- Standard date input – not inside record-edit-form -->
                    <lightning-input
                        type="date"
                        label="Date"
                        data-id="date"
                        value={prescriptionDate}
                        onchange={handleParentChange}
                        required>
                    </lightning-input>
                </div>

            </div>

            <!-- lightning-input-field must live inside a
                 lightning-record-edit-form to render correctly.
                 We use object-api-name="Prescription__c" here
                 purely for field metadata resolution; form
                 submission is intentionally prevented. -->
            
            </lightning-record-edit-form>

            <hr/>

            <!-- ───────────────────────────────────────────
                 SECTION 2 – Prescription Items (Child rows)
            ─────────────────────────────────────────────── -->
            <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium">
                <h3 class="slds-text-heading_small">Prescription Items</h3>
                <div>
                    <lightning-button
                        label="Add Item"
                        icon-name="utility:add"
                        icon-position="left"
                        variant="brand"
                        class="slds-m-right_x-small"
                        onclick={handleAddRow}>
                    </lightning-button>
                    <lightning-button
                        label="Reset Form"
                        icon-name="utility:reset"
                        icon-position="left"
                        variant="neutral"
                        onclick={handleResetForm}>
                    </lightning-button>
                </div>
            </div>

            <!-- Metadata wrapper for Prescription_Item__c fields.
                 onsubmit is blocked to prevent accidental DML. -->
            <lightning-record-edit-form
                object-api-name="Prescription_Item__c"
                onsubmit={handlePreventDefaultSubmit}>

                <!-- Empty-state message -->
                <template if:false={hasItems}>
                    <div class="slds-align_absolute-center slds-p-around_medium slds-text-color_weak">
                        No items added. Click "Add Item" to begin.
                    </div>
                </template>

                <!-- Column headers (only shown when rows exist) -->
                <template if:true={hasItems}>
                    <div class="slds-grid slds-gutters slds-m-bottom_x-small">
                        <div class="slds-col slds-size_4-of-12 slds-text-title_caps">Medicine *</div>
                        <div class="slds-col slds-size_2-of-12 slds-text-title_caps">Qty *</div>
                        <div class="slds-col slds-size_4-of-12 slds-text-title_caps">Description</div>
                        <div class="slds-col slds-size_2-of-12"></div>
                    </div>
                </template>

                <template for:each={prescriptionItems} for:item="item">
                    <div key={item.id}
                         class="slds-grid slds-gutters slds-grid_vertical-align-start slds-m-bottom_small">

                        <div class="slds-col slds-size_4-of-12">
                            <lightning-input-field
                                field-name="Medicine__c"
                                data-rowid={item.id}
                                data-field="Medicine__c"
                                value={item.Medicine__c}
                                onchange={handleItemChange}
                                required>
                            </lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_2-of-12">
                            <lightning-input-field
                                field-name="Quantity__c"
                                data-rowid={item.id}
                                data-field="Quantity__c"
                                value={item.Quantity__c}
                                onchange={handleItemChange}
                                required>
                            </lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_4-of-12">
                            <lightning-input-field
                                field-name="Description__c"
                                data-rowid={item.id}
                                data-field="Description__c"
                                value={item.Description__c}
                                onchange={handleItemChange}>
                            </lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_2-of-12 slds-p-top_large slds-text-align_center">
                            <lightning-button-icon
                                icon-name="utility:delete"
                                variant="destructive"
                                alternative-text="Delete Row"
                                title="Delete this item"
                                data-rowid={item.id}
                                onclick={handleDeleteRow}>
                            </lightning-button-icon>
                        </div>

                    </div>
                </template>

            </lightning-record-edit-form>

            <!-- ───────────────────────────────────────────
                 SECTION 3 – Submit
            ─────────────────────────────────────────────── -->
            <div class="slds-m-top_large slds-align_absolute-center">
                <lightning-button
                    label="Create Prescription"
                    variant="success"
                    disabled={isSaving}
                    onclick={handleSave}>
                </lightning-button>
            </div>

            <!-- Spinner overlay while saving -->
            <template if:true={isSaving}>
                <lightning-spinner
                    alternative-text="Saving prescription..."
                    size="medium">
                </lightning-spinner>
            </template>

        </div>

    </lightning-card>
</template>
